<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="chart" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="14" y1="16" x2="50" y2="16" stroke="#1a3a5c" stroke-width="0.5" opacity="0.5"/>
  <line x1="14" y1="28" x2="50" y2="28" stroke="#1a3a5c" stroke-width="0.5" opacity="0.5"/>
  <line x1="14" y1="40" x2="50" y2="40" stroke="#1a3a5c" stroke-width="0.5" opacity="0.5"/>
  <!-- Candlestick bars -->
  <rect x="16" y="22" width="4" height="18" rx="1" fill="#ef4444" opacity="0.9"/>
  <line x1="18" y1="18" x2="18" y2="44" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
  <rect x="24" y="16" width="4" height="24" rx="1" fill="#ef4444" opacity="0.9"/>
  <line x1="26" y1="12" x2="26" y2="44" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
  <rect x="32" y="20" width="4" height="20" rx="1" fill="#22c55e" opacity="0.9"/>
  <line x1="34" y1="16" x2="34" y2="44" stroke="#22c55e" stroke-width="1" opacity="0.7"/>
  <rect x="40" y="14" width="4" height="26" rx="1" fill="#ef4444" opacity="0.9"/>
  <line x1="42" y1="10" x2="42" y2="44" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
  <rect x="48" y="18" width="4" height="22" rx="1" fill="#ef4444" opacity="0.9"/>
  <line x1="50" y1="14" x2="50" y2="44" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
  <!-- Trend line -->
  <polyline points="18,36 26,28 34,32 42,22 50,24" fill="none" stroke="url(#chart)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AI sparkle -->
  <circle cx="50" cy="22" r="2" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="48" cy="19" r="1" fill="#ff6b6b" opacity="0.5"/>
  <circle cx="53" cy="20" r="0.8" fill="#ff6b6b" opacity="0.4"/>
</svg>
